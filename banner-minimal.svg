<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" width="1200" height="400">
  <defs>
    <!-- 배경 그래디언트 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1e;stop-opacity:1" />
    </linearGradient>

    <!-- 네온 텍스트 그래디언트 -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e0d5ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>

    <!-- 악센트 그래디언트 -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b21b6;stop-opacity:1" />
    </linearGradient>

    <!-- 글로우 필터 -->
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 강한 글로우 -->
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Syne:wght@600;700;800&display=swap');

      .main-title {
        font-family: 'Syne', sans-serif;
        font-size: 80px;
        font-weight: 800;
        letter-spacing: -2px;
        fill: url(#textGrad);
        filter: url(#strongGlow);
        text-anchor: middle;
      }

      .subtitle {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 24px;
        font-weight: 600;
        fill: #a78bfa;
        text-anchor: middle;
        letter-spacing: 1px;
      }

      .tag {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 13px;
        fill: #e0d5ff;
        text-anchor: middle;
      }

      @keyframes slideIn {
        from { 
          transform: translateX(-50px);
          opacity: 0;
        }
        to { 
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes slideInRight {
        from { 
          transform: translateX(50px);
          opacity: 0;
        }
        to { 
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .slide-in { animation: slideIn 0.8s ease-out; }
      .slide-in-right { animation: slideInRight 0.8s ease-out 0.2s both; }
      .fade-in { animation: fadeIn 0.8s ease-out 0.4s both; }
    </style>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="400" fill="url(#bgGradient)"/>

  <!-- 좌측 기하학 도형 -->
  <g opacity="0.08">
    <polygon points="0,0 200,0 150,200" fill="#7c3aed"/>
    <polygon points="0,200 0,400 150,300" fill="#a78bfa"/>
  </g>

  <!-- 우측 기하학 도형 -->
  <g opacity="0.08">
    <polygon points="1200,0 1000,0 1050,200" fill="#a78bfa"/>
    <polygon points="1200,200 1200,400 1050,300" fill="#7c3aed"/>
  </g>

  <!-- 중앙 원형 배경 -->
  <circle cx="600" cy="200" r="250" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.1"/>
  <circle cx="600" cy="200" r="200" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.15"/>

  <!-- 콘텐츠 -->
  <g>
    <!-- 메인 제목 -->
    <text x="600" y="120" class="main-title slide-in">JEONG CHANHO</text>

    <!-- 서브타이틀 -->
    <text x="600" y="200" class="subtitle slide-in">Back-End Developer</text>

    <!-- 강조 라인 -->
    <g class="fade-in">
      <line x1="450" y1="220" x2="750" y2="220" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>
    </g>

    <!-- 태그들 -->
    <g class="slide-in-right">
      <g>
        <rect x="380" y="260" width="100" height="35" rx="6" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
        <text x="430" y="283" class="tag">Backend</text>
      </g>

      <g>
        <rect x="550" y="260" width="100" height="35" rx="6" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
        <text x="600" y="283" class="tag">Scalable</text>
      </g>

      <g>
        <rect x="720" y="260" width="100" height="35" rx="6" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
        <text x="770" y="283" class="tag">Secure</text>
      </g>
    </g>

    <!-- 하단 인포 -->
    <g opacity="0.6" class="fade-in">
      <text x="600" y="360" class="tag" text-anchor="middle" font-size="14">Powered by Spring Boot | Java | Cloud</text>
    </g>
  </g>

  <!-- 우측 상단 장식 점 -->
  <circle cx="150" cy="60" r="4" fill="#a78bfa" opacity="0.8" class="fade-in"/>
  <circle cx="1050" cy="340" r="4" fill="#a78bfa" opacity="0.8" class="fade-in" style="animation-delay: 0.5s;"/>

  <!-- 분할선 -->
  <line x1="0" y1="380" x2="1200" y2="380" stroke="#7c3aed" stroke-width="1" opacity="0.2"/>
</svg>